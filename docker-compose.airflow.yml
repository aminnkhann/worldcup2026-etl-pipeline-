x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile.airflow
    args:
      AIRFLOW_VERSION: ${AIRFLOW_VERSION:-2.10.5}
  environment: &airflow-environment
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:${AIRFLOW_DB_PASSWORD:-airflow}@airflow-db/airflow
    AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY:-local-development-secret-key}
    FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
    FOOTBALL_BASE_URL: ${FOOTBALL_BASE_URL:-https://api.football-data.org/v4}
    WC_CODE: ${WC_CODE:-WC}
    FOOTBALL_DATA_SEASON: ${FOOTBALL_DATA_SEASON:-2026}
    REQUEST_DELAY: ${REQUEST_DELAY:-6}
    SCORERS_LIMIT: ${SCORERS_LIMIT:-1000}
    FETCH_MATCH_DETAILS: ${FETCH_MATCH_DETAILS:-true}
    STORE_RAW_RESPONSES: ${STORE_RAW_RESPONSES:-true}
    RAW_DATA_DIR: /opt/airflow/project/data/raw
    DB_HOST: postgres
    DB_PORT: 5432
    DB_NAME: ${DB_NAME:-worldcup2026}
    DB_USER: ${DB_USER:-worldcup}
    DB_PASSWORD: ${DB_PASSWORD:-worldcup_password}
  volumes:
    - ./airflow/dags:/opt/airflow/dags:ro
    - airflow-logs:/opt/airflow/logs
    - pipeline-data:/opt/airflow/project/data
    - pipeline-logs:/opt/airflow/project/logs
  depends_on:
    postgres:
      condition: service_healthy
    airflow-db:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_NAME:-worldcup2026}
      POSTGRES_USER: ${DB_USER:-worldcup}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-worldcup_password}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-worldcup} -d ${DB_NAME:-worldcup2026}"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD:-airflow}
    volumes:
      - airflow-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  airflow-init:
    <<: *airflow-common
    command:
      - bash
      - -c
      - >-
        airflow db migrate &&
        airflow users create
        --username "$${AIRFLOW_ADMIN_USERNAME:-airflow}"
        --password "$${AIRFLOW_ADMIN_PASSWORD:-airflow}"
        --firstname Airflow
        --lastname Admin
        --role Admin
        --email "$${AIRFLOW_ADMIN_EMAIL:-admin@example.com}"
    environment:
      <<: *airflow-environment
      AIRFLOW_ADMIN_USERNAME: ${AIRFLOW_ADMIN_USERNAME:-airflow}
      AIRFLOW_ADMIN_PASSWORD: ${AIRFLOW_ADMIN_PASSWORD:-airflow}
      AIRFLOW_ADMIN_EMAIL: ${AIRFLOW_ADMIN_EMAIL:-admin@example.com}
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "${AIRFLOW_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", "airflow jobs check --job-type SchedulerJob --hostname \"$${HOSTNAME}\""]
      interval: 30s
      timeout: 10s
      retries: 5
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres-data:
  airflow-db-data:
  airflow-logs:
  pipeline-data:
  pipeline-logs:
